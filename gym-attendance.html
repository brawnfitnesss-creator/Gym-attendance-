<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Staff Attendance</title>
<style>
  :root{
    --bg:#0d100d; --surface:#141712; --surface-alt:#111410; --border:#242822; --chip:#1c211b;
    --ink:#EDF2EC; --muted:#8A9285; --faint:#5c645a;
    --present:#9FFF3D; --present-dim:#3a4a1f;
    --absent:#FF5D5D; --absent-dim:#4a2323;
    --late:#FFB648; --late-dim:#4a3a1f;
    --half:#7FD9FF; --half-dim:#1f3a4a;
    --inf:#C9A6FF; --inf-dim:#332a4a;
    --med:#FF8FC7; --med-dim:#4a2338;
    --l3:#FFD166; --l2:#7FD9FF; --l1:#B9A6FF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
  .wrap{max-width:640px; margin:0 auto; padding:24px 16px 64px;}
  .eyebrow{font-size:11px; font-weight:900; letter-spacing:.25em; color:var(--present);}
  h1{font-size:24px; font-weight:900; letter-spacing:-0.02em; margin:2px 0 0;}
  .headerRow{display:flex; align-items:center; justify-content:space-between;}
  .iconBtn{background:transparent; border:1px solid var(--border); border-radius:999px; padding:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .iconBtn.active{background:var(--present); border-color:var(--present);}
  .card{border:1px solid var(--border); background:var(--surface); border-radius:16px;}
  .dateNav{display:flex; align-items:center; justify-content:space-between; padding:8px; margin-top:20px;}
  .dateNav button{background:var(--chip); border:none; color:var(--ink); border-radius:12px; padding:8px 10px; cursor:pointer; font-size:15px;}
  .dateNav button:disabled{opacity:.3; cursor:default;}
  .dateCenter{text-align:center;}
  .dateLabel{font-size:14px; font-weight:700;}
  .dateSubRow{display:flex; align-items:center; justify-content:center; gap:10px; margin-top:3px;}
  .jumpBtn{background:none; border:none; color:var(--present); font-size:11px; font-weight:900; letter-spacing:.05em; cursor:pointer; padding:0;}
  .summary{margin-top:20px; padding:20px; display:flex; gap:20px; align-items:center;}
  .ring{position:relative; width:96px; height:96px; flex-shrink:0;}
  .ring svg{transform:rotate(-90deg);}
  .ringLabel{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .ringPct{font-size:20px; font-weight:900;}
  .ringSub{font-size:9px; font-weight:700; letter-spacing:.15em; color:var(--muted);}
  .statGrid{flex:1; display:grid; grid-template-columns:repeat(3,1fr); gap:12px 8px;}
  .statNum{font-size:18px; font-weight:900;}
  .statLbl{font-size:9px; font-weight:700; letter-spacing:.15em; color:var(--muted);}
  .markedLine{font-size:11px; color:var(--muted); border-top:1px solid var(--surface-alt); margin-top:12px; padding-top:12px;}
  .addCard{margin-top:20px; padding:16px; display:none;}
  .addCard.show{display:block;}
  .addTitle{font-size:11px; font-weight:900; letter-spacing:.15em; color:var(--present); margin-bottom:12px;}
  .addRow{display:flex; gap:8px;}
  .addRow input, .addRow select{background:var(--bg); border:1px solid var(--border); color:var(--ink); border-radius:12px; padding:8px 10px; font-size:14px; font-weight:600;}
  .addRow input{flex:1; min-width:0;}
  .addRow button{background:var(--present); color:var(--bg); border:none; border-radius:12px; padding:8px 12px; font-weight:900; cursor:pointer; font-size:16px;}
  .levelSection{margin-top:24px;}
  .levelHead{display:flex; align-items:baseline; gap:8px; margin-bottom:10px; padding:0 4px;}
  .levelTitle{font-size:11px; font-weight:900; letter-spacing:.2em;}
  .levelSub{font-size:10px; font-weight:700; letter-spacing:.15em; color:var(--faint);}
  .rosterCard{border:1px solid var(--border); border-radius:16px; overflow:hidden;}
  .empty{padding:16px; color:var(--faint); font-size:14px;}
  .row{padding:12px 16px; display:flex; align-items:center; justify-content:space-between;}
  .row:not(:first-child){border-top:1px solid var(--surface-alt);}
  .rowLeft{display:flex; align-items:center; gap:12px; min-width:0;}
  .avatar{width:32px; height:32px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:900; border:1px solid var(--border); background:var(--chip); color:var(--faint); flex-shrink:0;}
  .name{font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .chipBtn{background:var(--chip); border:1px solid var(--border); color:var(--faint); border-radius:999px; padding:6px 12px; font-size:11px; font-weight:900; letter-spacing:.03em; cursor:pointer;}
  .delBtn{background:var(--chip); border:none; border-radius:10px; padding:8px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .picker{display:none; grid-template-columns:repeat(3,1fr); gap:8px; padding:0 16px 14px;}
  .picker.show{display:grid;}
  .pickBtn{background:var(--chip); border:1px solid var(--border); border-radius:12px; padding:8px 4px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;}
  .pickBtn .pIcon{font-size:14px; font-weight:900;}
  .pickBtn .pLbl{font-size:9px; font-weight:900; letter-spacing:.03em; color:var(--muted);}
  .trendSection{margin-top:28px;}
  .trendTitle{font-size:11px; font-weight:900; letter-spacing:.2em; color:var(--muted); margin-bottom:10px; padding:0 4px;}
  .trendCard{border:1px solid var(--border); background:var(--surface); border-radius:16px; padding:16px; display:flex; align-items:flex-end; justify-content:space-between; gap:8px; height:110px;}
  .trendBarWrap{flex:1; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; gap:6px;}
  .trendBar{width:100%; border-radius:6px; background:var(--present-dim); transition:height .3s ease;}
  .trendDay{font-size:10px; font-weight:700; color:var(--faint);}
  .loading{text-align:center; color:var(--faint); font-size:12px; margin-top:20px;}
  .storageWarning{display:none; margin-top:14px; padding:10px 12px; border-radius:12px; background:var(--late-dim); border:1px solid var(--late); color:var(--late); font-size:12px; font-weight:600; line-height:1.4;}
  .storageWarning.show{display:block;}
</style>
</head>
<body>
<div class="wrap">

  <div class="headerRow">
    <div>
      <div class="eyebrow">FLOOR ATTENDANCE</div>
      <h1>GYM STAFF</h1>
    </div>
    <button class="iconBtn" id="editToggle" title="Manage roster">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>

  <div class="storageWarning" id="storageWarning">
    &#9888;&#65039; This preview can't save to your device. Save this file and open it directly in your phone's browser for attendance to persist.
  </div>

  <div class="card dateNav">
    <button id="prevDay">&#8249;</button>
    <div class="dateCenter">
      <div class="dateLabel" id="dateLabel">-</div>
      <div class="dateSubRow">
        <button class="jumpBtn" id="pickDate">&#128197; PICK DATE</button>
        <button class="jumpBtn" id="jumpToday" style="display:none;">JUMP TO TODAY</button>
      </div>
    </div>
    <button id="nextDay">&#8250;</button>
  </div>
  <input type="date" id="datePicker" style="position:absolute; opacity:0; width:1px; height:1px; pointer-events:none;">

  <div class="card summary">
    <div class="ring">
      <svg width="96" height="96">
        <circle cx="48" cy="48" r="41.5" stroke="#242822" stroke-width="9" fill="none"></circle>
        <circle id="ringFg" cx="48" cy="48" r="41.5" stroke="#9FFF3D" stroke-width="9" fill="none" stroke-linecap="round" stroke-dasharray="260.75" stroke-dashoffset="260.75" style="transition:stroke-dashoffset .4s ease;"></circle>
      </svg>
      <div class="ringLabel">
        <div class="ringPct" id="ringPct">0%</div>
        <div class="ringSub">COVERAGE</div>
      </div>
    </div>
    <div style="flex:1;">
      <div class="statGrid" id="statGrid"></div>
      <div class="markedLine" id="markedLine">0/0 marked</div>
    </div>
  </div>

  <div class="card addCard" id="addCard">
    <div class="addTitle">ADD STAFF</div>
    <div class="addRow">
      <input type="text" id="newName" placeholder="Name">
      <select id="newLevel">
        <option value="3">L3</option>
        <option value="2" selected>L2</option>
        <option value="1">L1</option>
      </select>
      <button id="addStaffBtn">+</button>
    </div>
  </div>

  <div id="levels"></div>

  <div class="trendSection">
    <div class="trendTitle">LAST 7 DAYS</div>
    <div class="trendCard" id="trendCard"></div>
  </div>

  <div class="loading" id="loading" style="display:none;">loading&hellip;</div>

</div>

<script>
const DEFAULT_ROSTER = [
  { id: "suresh", name: "SURESH", level: 3 },
  { id: "rahul", name: "RAHUL", level: 3 },
  { id: "deepak", name: "DEEPAK", level: 3 },
  { id: "huzaifa", name: "HUZAIFA", level: 2 },
  { id: "jubair", name: "JUBAIR", level: 2 },
  { id: "ashutosh", name: "ASHUTOSH", level: 2 },
  { id: "ayaz", name: "AYAZ", level: 2 },
  { id: "dev", name: "DEV", level: 2 },
  { id: "mayur", name: "MAYUR", level: 2 },
  { id: "abdul", name: "ABDUL", level: 2 },
  { id: "shri", name: "SHRI", level: 2 },
  { id: "sunny", name: "SUNNY", level: 2 },
  { id: "santosh", name: "SANTOSH", level: 2 },
  { id: "mayank", name: "MAYANK", level: 2 },
  { id: "ajay", name: "AJAY", level: 1 },
  { id: "pratham", name: "PRATHAM", level: 1 },
  { id: "mohammad", name: "MOHAMMAD", level: 1 },
  { id: "aziz", name: "AZIZ", level: 1 },
  { id: "raja", name: "RAJA", level: 1 },
  { id: "ravi", name: "RAVI", level: 1 },
];

const STATUS_ORDER = ["P","A","LT","HD","IL","ML"];
const STATUS = {
  P:  { label:"PRESENT",        short:"PRESENT", icon:"&#10003;", color:"var(--present)", dim:"var(--present-dim)" },
  A:  { label:"ABSENT",         short:"ABSENT",  icon:"&#10005;", color:"var(--absent)",  dim:"var(--absent-dim)" },
  LT: { label:"LATE",           short:"LATE",    icon:"&#9201;",  color:"var(--late)",    dim:"var(--late-dim)" },
  HD: { label:"HALF DAY",       short:"HALF",    icon:"&#9680;",  color:"var(--half)",    dim:"var(--half-dim)" },
  IL: { label:"INFORMED LEAVE", short:"INF. LV", icon:"&#128172;",color:"var(--inf)",     dim:"var(--inf-dim)" },
  ML: { label:"MEDICAL LEAVE",  short:"MED. LV", icon:"&#10010;", color:"var(--med)",     dim:"var(--med-dim)" },
};
const LEVEL_META = {
  3: { title:"LEVEL 3", sub:"SENIOR", tint:"var(--l3)" },
  2: { title:"LEVEL 2", sub:"STAFF",  tint:"var(--l2)" },
  1: { title:"LEVEL 1", sub:"JUNIOR", tint:"var(--l1)" },
};

let roster = DEFAULT_ROSTER.slice();
let marks = {};
let history = {};
let date = todayStr();
let editMode = false;
let expandedId = null;

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addDays(d, delta){ const dt = new Date(d+"T00:00:00"); dt.setDate(dt.getDate()+delta); return dt.toISOString().slice(0,10); }
function fmtDateLabel(d){ const dt = new Date(d+"T00:00:00"); return dt.toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}); }

const LS_PREFIX = "gymAttendance:";
let memoryStore = {};
let lsAvailable = null;

function isLocalStorageAvailable(){
  if (lsAvailable !== null) return lsAvailable;
  try {
    const testKey = "__ls_test__";
    window.localStorage.setItem(testKey, "1");
    window.localStorage.removeItem(testKey);
    lsAvailable = true;
  } catch(e) {
    lsAvailable = false;
  }
  return lsAvailable;
}

async function storageGet(key){
  try{
    if (isLocalStorageAvailable()) {
      const raw = window.localStorage.getItem(LS_PREFIX + key);
      return raw ? JSON.parse(raw) : null;
    }
    const raw = memoryStore[LS_PREFIX + key];
    return raw ? JSON.parse(raw) : null;
  } catch(e){ return null; }
}
async function storageSet(key, value){
  try{
    const raw = JSON.stringify(value);
    if (isLocalStorageAvailable()) {
      window.localStorage.setItem(LS_PREFIX + key, raw);
    } else {
      memoryStore[LS_PREFIX + key] = raw;
    }
  } catch(e){ /* data still held in memory for this session */ }
}

async function loadRoster(){
  const r = await storageGet("roster");
  if (r) roster = r;
  // if nothing saved yet, keep using the built-in default in memory —
  // it gets persisted the first time the user actually adds/removes someone
}

async function loadMarksForDate(){
  document.getElementById("loading").style.display = "block";
  const m = await storageGet("attendance:"+date);
  marks = m || {};
  document.getElementById("loading").style.display = "none";
}

async function loadHistory(){
  const days = Array.from({length:7}, (_,i)=> addDays(date, -6+i));
  const results = {};
  await Promise.all(days.map(async d => { results[d] = (await storageGet("attendance:"+d)) || {}; }));
  history = results;
}

async function setStatus(staffId, status){
  if (marks[staffId] === status) delete marks[staffId];
  else marks[staffId] = status;
  await storageSet("attendance:"+date, marks);
  history[date] = marks;
  render();
}

async function addStaffFn(){
  const nameInput = document.getElementById("newName");
  const levelSel = document.getElementById("newLevel");
  const name = nameInput.value.trim().toUpperCase();
  if (!name) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g,"-") + "-" + Date.now().toString(36);
  roster.push({ id, name, level: Number(levelSel.value) });
  await storageSet("roster", roster);
  nameInput.value = "";
  render();
}

async function removeStaffFn(id){
  roster = roster.filter(s => s.id !== id);
  await storageSet("roster", roster);
  render();
}

function computeTotals(){
  const total = roster.length;
  const counts = { P:0, A:0, LT:0, HD:0, IL:0, ML:0 };
  roster.forEach(s => { const st = marks[s.id]; if (st && counts[st] !== undefined) counts[st]++; });
  const marked = Object.values(counts).reduce((a,b)=>a+b,0);
  const coverage = counts.P + counts.HD*0.5;
  const pct = total ? Math.round((coverage/total)*100) : 0;
  return { total, counts, marked, pct };
}

function render(){
  document.getElementById("dateLabel").textContent = fmtDateLabel(date);
  const isToday = date === todayStr();
  document.getElementById("jumpToday").style.display = isToday ? "none" : "block";
  document.getElementById("nextDay").disabled = isToday;

  const totals = computeTotals();
  const circumference = 260.75;
  const offset = circumference - (totals.pct/100)*circumference;
  document.getElementById("ringFg").setAttribute("stroke-dashoffset", offset);
  document.getElementById("ringPct").textContent = totals.pct + "%";
  document.getElementById("markedLine").textContent = totals.marked + "/" + totals.total + " marked";

  const statGrid = document.getElementById("statGrid");
  statGrid.innerHTML = STATUS_ORDER.map(k => `
    <div>
      <div class="statNum" style="color:${STATUS[k].color}">${totals.counts[k]}</div>
      <div class="statLbl">${STATUS[k].short}</div>
    </div>`).join("");

  document.getElementById("addCard").classList.toggle("show", editMode);

  const levelsEl = document.getElementById("levels");
  levelsEl.innerHTML = [3,2,1].map(lvl => {
    const staff = roster.filter(s => s.level === lvl);
    const meta = LEVEL_META[lvl];
    const rowsHtml = staff.length === 0
      ? `<div class="empty">No one at this level yet.</div>`
      : staff.map(s => {
          const st = marks[s.id];
          const isOpen = expandedId === s.id;
          const avatarColor = st ? STATUS[st].color : "var(--faint)";
          const avatarDim = st ? STATUS[st].dim : "var(--chip)";
          const avatarBorder = st ? STATUS[st].color : "var(--border)";
          const rightControl = editMode
            ? `<button class="delBtn" data-del="${s.id}">
                 <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#FF5D5D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>
               </button>`
            : `<button class="chipBtn" data-expand="${s.id}" style="background:${avatarDim};color:${avatarColor};border-color:${avatarBorder};">${st ? STATUS[st].short : "MARK"}</button>`;
          const picker = (isOpen && !editMode)
            ? `<div class="picker show">${STATUS_ORDER.map(k => {
                const active = st === k;
                return `<button class="pickBtn" data-pick="${s.id}|${k}" style="background:${active?STATUS[k].color:'var(--chip)'};border-color:${active?STATUS[k].color:'var(--border)'};">
                          <span class="pIcon" style="color:${active?'#0d100d':STATUS[k].color}">${STATUS[k].icon}</span>
                          <span class="pLbl" style="color:${active?'#0d100d':'var(--muted)'}">${STATUS[k].short}</span>
                        </button>`;
              }).join("")}</div>`
            : "";
          return `
            <div>
              <div class="row">
                <div class="rowLeft">
                  <div class="avatar" style="background:${avatarDim};color:${avatarColor};border-color:${avatarBorder};">${s.name.slice(0,1)}</div>
                  <div class="name">${s.name}</div>
                </div>
                ${rightControl}
              </div>
              ${picker}
            </div>`;
        }).join("");
    return `
      <div class="levelSection">
        <div class="levelHead">
          <span class="levelTitle" style="color:${meta.tint}">${meta.title}</span>
          <span class="levelSub">${meta.sub} &middot; ${staff.length}</span>
        </div>
        <div class="rosterCard">${rowsHtml}</div>
      </div>`;
  }).join("");

  // wire up row events
  levelsEl.querySelectorAll("[data-expand]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-expand");
      expandedId = expandedId === id ? null : id;
      render();
    });
  });
  levelsEl.querySelectorAll("[data-pick]").forEach(btn => {
    btn.addEventListener("click", () => {
      const [id, status] = btn.getAttribute("data-pick").split("|");
      expandedId = null;
      setStatus(id, status);
    });
  });
  levelsEl.querySelectorAll("[data-del]").forEach(btn => {
    btn.addEventListener("click", () => removeStaffFn(btn.getAttribute("data-del")));
  });

  // trend strip
  const trendCard = document.getElementById("trendCard");
  const sortedDays = Object.keys(history).sort();
  trendCard.innerHTML = sortedDays.map(d => {
    const m = history[d] || {};
    const coverage = roster.reduce((acc,s) => acc + (m[s.id]==="P" ? 1 : m[s.id]==="HD" ? 0.5 : 0), 0);
    const pct = roster.length ? coverage/roster.length : 0;
    const dayLabel = new Date(d+"T00:00:00").toLocaleDateString("en-IN",{weekday:"narrow"});
    const isCur = d === date;
    return `
      <div class="trendBarWrap">
        <div class="trendBar" style="height:${Math.max(6, pct*62)}px; background:${isCur ? 'var(--present)' : 'var(--present-dim)'};"></div>
        <div class="trendDay" style="color:${isCur ? 'var(--present)' : 'var(--faint)'}">${dayLabel}</div>
      </div>`;
  }).join("");
}

async function goToDate(newDate){
  date = newDate;
  expandedId = null;
  await loadMarksForDate();
  await loadHistory();
  render();
}

document.getElementById("prevDay").addEventListener("click", () => goToDate(addDays(date, -1)));
document.getElementById("nextDay").addEventListener("click", () => { if (date !== todayStr()) goToDate(addDays(date, 1)); });
document.getElementById("jumpToday").addEventListener("click", () => goToDate(todayStr()));
document.getElementById("pickDate").addEventListener("click", () => {
  const input = document.getElementById("datePicker");
  input.value = date;
  input.max = todayStr();
  try {
    if (typeof input.showPicker === "function") {
      input.showPicker();
    } else {
      input.focus();
      input.click();
    }
  } catch (e) {
    input.focus();
  }
});
document.getElementById("datePicker").addEventListener("change", (e) => {
  if (e.target.value) goToDate(e.target.value);
});
document.getElementById("editToggle").addEventListener("click", (e) => {
  editMode = !editMode;
  expandedId = null;
  e.currentTarget.classList.toggle("active", editMode);
  render();
});
document.getElementById("addStaffBtn").addEventListener("click", addStaffFn);
document.getElementById("newName").addEventListener("keydown", (e) => { if (e.key === "Enter") addStaffFn(); });

(async function init(){
  try {
    if (!isLocalStorageAvailable()) {
      document.getElementById("storageWarning").classList.add("show");
    }
    await loadRoster();
    await loadMarksForDate();
    await loadHistory();
    render();
  } catch (e) {
    console.error("init failed", e);
  }
})();
</script>
</body>
</html>
